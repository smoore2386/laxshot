; PlatformIO Configuration for LaxPod Firmware
; =============================================
; Target: Seeed XIAO nRF52840 Sense
; Framework: Arduino (Adafruit nRF52 BSP)
;
; Build:   pio run
; Flash:   pio run --target upload
; Monitor: pio device monitor -b 115200
; Clean:   pio run --target clean

[platformio]
src_dir = laxpod
boards_dir = boards

[env:xiao_nrf52840_sense]
platform = nordicnrf52
board = xiaoblesense
framework = arduino

; Library dependencies
lib_deps =
    Seeed-Studio/Seeed Arduino LSM6DS3@^2.0.3
    arduino-libraries/Madgwick@^1.2.0

; Serial monitor
monitor_speed = 115200

; Build flags
build_flags =
    -DCFG_DEBUG=0
    -DARDUINO_NRF52840_XIAOSENSE

; Upload protocol (USB-C)
upload_protocol = nrfutil
