name: laxshot
description: LaxShot — youth lacrosse analysis app with AI-powered shot and save tracking.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.1.0
  firebase_analytics: ^11.2.0
  cloud_functions: ^5.0.0

  # Camera & ML
  camera: ^0.11.0
  # ML: TFLite Interpreter (cross-platform, no arm64 sim conflicts) is primary.
  # google_mlkit_pose_detection: ^0.14.0  # Keep disabled — incompatible with iOS 26 simulator (arm64). Re-enable for real-device TestFlight builds only.
  tflite_flutter: ^0.10.4           # TFLite runtime — no conflicting deps, works on iOS 26 sim + real device
  # flutter_tflite: ^1.0.1          # Conflicts with image_picker ^1.x — do not use
  video_player: ^2.9.1
  image_picker: ^1.1.2

  # Auth — social sign-in
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.3

  # Navigation
  go_router: ^14.2.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Charts & UI
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shared_preferences: ^2.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/models/
